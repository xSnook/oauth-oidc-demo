services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

  api:
    image: ${ECR_REGISTRY}/app-api:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ./api.env
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ${ECR_REGISTRY}/app-web:${IMAGE_TAG}
    restart: unless-stopped
    expose:
      - "80"

volumes:
  caddy_data:
  caddy_config:
