name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: appdb
          MYSQL_USER: appuser
          MYSQL_PASSWORD: apppass
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -uroot -proot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: local
      DATABASE_URL: mysql+pymysql://appuser:apppass@127.0.0.1:3306/appdb?charset=utf8mb4
      SESSION_JWT_SECRET: ci-only-secret-0123456789abcdef0123456789abcdef
      GOOGLE_CLIENT_ID: ci-dummy
      AZURE_CLIENT_ID: ci-dummy
      COOKIE_SECURE: "false"
      DB_REQUIRE_TLS: "false"
      ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.lock

      - name: Install backend dependencies
        run: pip install --require-hashes -r backend/requirements-dev.lock

      - name: Lint backend
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Migration smoke test
        working-directory: backend
        run: |
          test "$(alembic heads | wc -l)" -eq 1
          alembic upgrade head

      - name: Test backend
        working-directory: backend
        run: python -m pytest -q

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Build and push app-api
        run: |
          REG=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker build --target prod \
            -t "$REG/app-api:${{ github.sha }}" \
            -t "$REG/app-api:latest" \
            backend
          docker push --all-tags "$REG/app-api"

      - name: Build and push app-web
        run: |
          REG=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker build --target prod \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }} \
            --build-arg VITE_AZURE_CLIENT_ID=${{ vars.VITE_AZURE_CLIENT_ID }} \
            -t "$REG/app-web:${{ github.sha }}" \
            -t "$REG/app-web:latest" \
            frontend
          docker push --all-tags "$REG/app-web"

  deploy:
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy through SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'BUILD_REMOTE_DEPLOY'
          import os
          from pathlib import Path

          def heredoc(path, marker, content):
              if marker in content:
                  raise ValueError(f"{marker} marker appears in {path}")
              return f"cat > {path} <<'{marker}'\n{content.rstrip()}\n{marker}\n"

          deploy_files = "\n".join(
              [
                  heredoc("Caddyfile", "REMOTE_CADDYFILE", Path("deploy/Caddyfile").read_text()),
                  heredoc(
                      "docker-compose.prod.yml",
                      "REMOTE_COMPOSE",
                      Path("deploy/docker-compose.prod.yml").read_text(),
                  ),
                  heredoc("fetch-env.sh", "REMOTE_FETCH_ENV", Path("deploy/fetch-env.sh").read_text()),
              ]
          )

          script = r'''set -euo pipefail
          cd /opt/app

          __DEPLOY_FILES__
          chmod +x fetch-env.sh

          if ! command -v docker-credential-ecr-login >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y amazon-ecr-credential-helper
          fi

          ECR_REGISTRY="$(grep '^ECR_REGISTRY=' .env | cut -d= -f2)"
          mkdir -p /root/.docker
          python3 - "$ECR_REGISTRY" <<'PY'
          import json
          import sys
          from pathlib import Path

          registry = sys.argv[1]
          config_path = Path("/root/.docker/config.json")
          if config_path.exists():
              config = json.loads(config_path.read_text() or "{}")
          else:
              config = {}
          config.setdefault("credHelpers", {})[registry] = "ecr-login"
          config.pop("auths", None)
          config_path.write_text(json.dumps(config))
          PY

          ./fetch-env.sh

          RUNNING=$(docker inspect --format '{{.Config.Image}}' \
            $(docker compose -f docker-compose.prod.yml ps -q api) 2>/dev/null | cut -d: -f2 || true)
          [ -n "$RUNNING" ] && echo "$RUNNING" > .previous_tag

          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=__GIT_SHA__/" .env
          docker compose -f docker-compose.prod.yml pull

          docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml restart caddy

          for i in $(seq 1 30); do
            curl -fsS http://localhost/api/health && break
            sleep 2
            [ "$i" = "30" ] && { echo "smoke test failed"; exit 1; }
          done

          docker image prune -af --filter "until=72h"
          '''

          script = script.replace("__DEPLOY_FILES__", deploy_files)
          script = script.replace("__GIT_SHA__", os.environ["GIT_SHA"])
          Path("remote-deploy.sh").write_text(script)
          BUILD_REMOTE_DEPLOY

          python3 - <<'BUILD_SSM_COMMANDS'
          import json
          from pathlib import Path

          script = Path("remote-deploy.sh").read_text()
          command = "bash -s <<'REMOTE_DEPLOY_SCRIPT'\n" + script + "\nREMOTE_DEPLOY_SCRIPT"
          Path("ssm-commands.json").write_text(json.dumps({"commands": [command]}))
          BUILD_SSM_COMMANDS

          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --targets "Key=instanceids,Values=${EC2_INSTANCE_ID}" \
            --parameters file://ssm-commands.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: ${COMMAND_ID}"

          set +e
          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}"
          WAIT_STATUS=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "Status" \
            --output text)

          if [ "${WAIT_STATUS}" -ne 0 ] || [ "${STATUS}" != "Success" ]; then
            echo "SSM deploy failed with status ${STATUS}"
            exit 1
          fi
